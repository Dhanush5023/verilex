version: '3.8'

services:
  backend:
    build: ./backend
    container_name: verilex_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/verilex.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.1-8b-instant
      - SECRET_KEY=09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - FRONTEND_URL=http://localhost
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: verilex_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
